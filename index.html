<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hygiene Connect & Sanitization Care</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background: linear-gradient(135deg, #00c6ff, #38ef7d, #ffffff);
  text-align: center;
  overflow-x: hidden;
}

/* HEADER AREA */
.header {
  padding: 30px 10px;
}

.welcome {
  font-size: 42px;
  font-weight: bold;
  color: #1b4d89; /* blue formal */
  margin-bottom: 10px;
}

.subline {
  font-size: 20px;
  color: #2e7d32;
  letter-spacing: 1px;
}

/* 3 MAIN TITLES SAME SIZE DIFFERENT COLORS */
.title-box {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.title {
  font-size: 26px;
  font-weight: bold;
}

.health {
  color: #1565c0; /* blue */
}

.hygiene {
  color: #2e7d32; /* green */
}

.sanitization {
  color: #ef6c00; /* orange */
}

/* CARD */
.card {
  background: rgba(255,255,255,0.92);
  width: 80%;
  margin: 15px auto;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* BUTTON */
button {
  padding: 12px 20px;
  background: #00695c;
  color: white;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
}

button:hover {
  background: #003d33;
  transform: scale(1.05);
}

input, textarea {
  width: 80%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid gray;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="welcome">Welcome to Gates Institute of Technology (Gooty)</div>

  <div class="subline">CSP Project – Community Service Program</div>

  <div class="title-box">
    <div class="title health">Health</div>
    <div class="title hygiene">Hygiene</div>
    <div class="title sanitization">Sanitization</div>
  </div>
</div>

<!-- MAIN CONTENT START -->
<div class="card">
  <h3>Hygiene Connect & Sanitization Care</h3>
  <p>
    Community project focusing on awareness of cleanliness, hygiene habits
    and disease prevention in rural and urban areas.
  </p>
</div>

</body>
</html>
