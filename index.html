<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hygiene Connect & Sanitization Care</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;

  /* 💜 LIGHT + DARK PURPLE BACKGROUND */
  background: linear-gradient(135deg, #e6ccff, #7b2cbf, #3c096c);

  text-align: center;
  overflow-x: hidden;
}

/* WATERMARK */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    url("https://cdn-icons-png.flaticon.com/512/2966/2966488.png"),
    url("https://cdn-icons-png.flaticon.com/512/3082/3082011.png");

  background-repeat: no-repeat;
  background-position: left 15% top 25%, right 15% bottom 25%;
  background-size: 220px, 220px;
  opacity: 0.08;
  z-index: -1;
}

/* HEADER */
.header {
  padding: 30px 10px;
}

.welcome {
  font-size: 42px;
  font-weight: bold;
  color: #ffffff;
}

/* TITLE BOX */
.title-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

/* TITLE STYLE */
.title {
  font-size: 26px;
  font-weight: bold;
  color: white;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.92);
  width: 80%;
  margin: 15px auto;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* BUTTON */
button {
  padding: 12px 20px;
  background: #5a189a;
  color: white;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
}

button:hover {
  background: #3c096c;
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="welcome">
    Welcome to Gates Institute of Technology (Gooty)
  </div>

  <!-- TWO LINE HEADING -->
  <div class="title-box">

    <div class="title">Health & Hygiene</div>

    <div class="title">Sanitization & Hygiene Education</div>

  </div>

</div>

<!-- CONTENT -->
<div class="card">
  <h3>Hygiene Connect & Sanitization Care</h3>
  <p>
    A community service project focusing on awareness of cleanliness,
    hygiene habits, and disease prevention in society.
  </p>
</div>

</body>
</html>
