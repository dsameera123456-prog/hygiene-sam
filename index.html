<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hygiene Connect & Sanitization Care</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;

  /* ✅ ONLY CHANGE: NEW SKY BLUE + BLUE WHITE BACKGROUND */
  background: linear-gradient(135deg, #87CEEB, #dff6ff, #ffffff);

  text-align: center;
  overflow-x: hidden;
}

/* WATERMARK (UNCHANGED) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    url("https://cdn-icons-png.flaticon.com/512/2966/2966488.png"),
    url("https://cdn-icons-png.flaticon.com/512/3082/3082011.png");

  background-repeat: no-repeat;
  background-position: left 15% top 25%, right 15% bottom 25%;
  background-size: 220px, 220px;
  opacity: 0.08;
  z-index: -1;
}

/* HEADER (UNCHANGED) */
.header {
  padding: 30px 10px;
}

.welcome {
  font-size: 42px;
  font-weight: bold;
  color: #0b3d91;
}

/* TWO LINES (UNCHANGED) */
.title-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

.title {
  font-size: 26px;
  font-weight: bold;
}

.health { color: #1565c0; }
.hygiene { color: #2e7d32; }
.sanitization { color: #ef6c00; }

/* CARD (UNCHANGED) */
.card {
  background: rgba(255,255,255,0.92);
  width: 80%;
  margin: 15px auto;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* BUTTON (UNCHANGED) */
button {
  padding: 12px 20px;
  background: #00695c;
  color: white;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
}

button:hover {
  background: #003d33;
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="welcome">
    Welcome to Gates Institute of Technology (Gooty)
  </div>

  <!-- TWO LINE HEADING -->
  <div class="title-box">

    <div class="title health">Health & Hygiene</div>

    <div class="title sanitization">Sanitization & Hygiene Education</div>

  </div>
