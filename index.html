<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hygiene Connect & Sanitization Care</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;

  /* 💜 SAME BACKGROUND (NO CHANGE) */
  background: linear-gradient(135deg, #e6ccff, #7b2cbf, #3c096c);

  text-align: center;
  overflow-x: hidden;
}

/* WATERMARK (UNCHANGED) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    url("https://cdn-icons-png.flaticon.com/512/2966/2966488.png"),
    url("https://cdn-icons-png.flaticon.com/512/3082/3082011.png");

  background-repeat: no-repeat;
  background-position: left 15% top 25%, right 15% bottom 25%;
  background-size: 220px, 220px;
  opacity: 0.08;
  z-index: -1;
}

/* HEADER */
.header {
  padding: 30px 10px;
}

/* SMALL LINES */
.line {
  color: #ffffff;
  font-size: 20px;
  margin: 5px 0;
}

/* MAIN TITLE (VERY BIG + DARK PURPLE) */
.main-title {
  font-size: 44px;
  font-weight: bold;
  color: #2d0057; /* dark purple */
  margin: 15px 0;
}

/* SUB TITLE */
.sub-title {
  font-size: 26px;
  font-weight: bold;
  color: #ffffff;
  margin-top: 10px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.92);
  width: 80%;
  margin: 15px auto;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <!-- LINE 1 -->
  <div class="line">Welcome</div>

  <!-- LINE 2 -->
  <div class="line">Gates Institute of Technology (Gooty)</div>

  <!-- MAIN CSP TITLE -->
  <div class="main-title">CSP Project of Health and Hygiene</div>

  <!-- SUB TITLE -->
  <div class="sub-title">Sanitization & Hygiene Education</div>

</div>

<!-- CONTENT -->
<div class="card">
  <h3>Hygiene Connect & Sanitization Care</h3>
  <p>
    A community service project focusing on awareness of cleanliness,
    hygiene habits, and disease prevention in society.
  </p>
</div>

</body>
</html>
